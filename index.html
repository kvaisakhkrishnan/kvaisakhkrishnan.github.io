    document.body.addEventListener('click', () => {
        if (!terminalContainer.classList.contains('hidden') && window.getSelection().toString() === '') {

    });

    window.onload = () => {
        inputField.disabled = true;
        const logs = [
            "CPU = Intel(R) Core(TM) Processor",
            "00640K System RAM Passed",
            "02048M Extended RAM Passed",
            "System BIOS shadowed",
            "Video BIOS shadowed",
            "Mouse initialized",

            "Starting devops_daemon... [ OK ]",
            "Booting DevOS..."
        ];

        let delay = 0;
        logs.forEach((log, index) => {
            delay += Math.random() * 250 + 100;
            setTimeout(() => {
                biosLogs.innerHTML += `<div>${log}</div>`;
                if (Math.random() > 0.7) {
                    document.body.classList.add('reboot-glitch');
                    setTimeout(() => document.body.classList.remove('reboot-glitch'), 100);
                }
                if (index === logs.length - 1) {
                    setTimeout(() => startTerminal(), 800);
                }
            }, delay);
        });
    };

    async function startTerminal() {
        biosContainer.classList.add('hidden');
        terminalContainer.classList.remove('hidden');
        terminalContainer.classList.add('flex');
        document.body.classList.remove('bg-black');
        document.body.classList.add('bg-gray-950');

        const initCmd = 'cd /home/kvaisakh';
        for (let i = 0; i < initCmd.length; i++) {
            inputField.value += initCmd.charAt(i);
            await new Promise(r => setTimeout(r, 40));
        }
        await new Promise(r => setTimeout(r, 300));
        processCommand(initCmd);
        inputField.value = '';
        inputField.disabled = false;
        inputField.focus();
    }

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const cmdString = this.value.trim();
            this.value = '';
            if (cmdString) processCommand(cmdString);
        }
    });

    function quickCommand(cmdString) {
        processCommand(cmdString);
        inputField.focus();
    }

    function processCommand(cmdString) {
        const normalizedCmd = cmdString.replace(/\s+/g, ' ').trim().toLowerCase();

        if (normalizedCmd === 'clear') {
            terminalHistory.innerHTML = '';
            return;
        }

        const historyEntry = document.createElement('div');
        historyEntry.innerHTML = `<span class="text-emerald-600 mr-2">kvaisakh@devops:~$</span><span class="text-gray-100">${cmdString}</span>`;
        terminalHistory.appendChild(historyEntry);

        if (normalizedCmd === 'help') {
            const helpEntry = document.createElement('div');
            helpEntry.className = 'text-gray-400 ml-4 mb-4 mt-2';
            helpEntry.innerHTML = `Available commands:<br>
            - cd /home/kvaisakh<br>
            - ls<br>
            - experience<br>
            - cat experience.log<br>
            - skills<br>
            - cat skills.json<br>
            - projects<br>
            - ls -la ./projects<br>
            - contact<br>
            - ./contact.sh<br>
            - clear<br>
            - reboot`;
            terminalHistory.appendChild(helpEntry);

        } else if (normalizedCmd === 'reboot') {
            const rebootEntry = document.createElement('div');
            rebootEntry.className = 'text-red-500 font-bold ml-4 mb-4 mt-2';
            rebootEntry.innerText = 'Broadcast message from root@devops: The system is going down for reboot NOW!';
            terminalHistory.appendChild(rebootEntry);
            inputField.disabled = true;
            setTimeout(() => {
                terminalContainer.style.animation = "crt-off 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards";
                setTimeout(() => window.location.reload(), 600);
            }, 1200);
            return;

        } else {
            let foundId = null;
            for (const [key, id] of Object.entries(commandMap)) {
                if (key === normalizedCmd) {
                    foundId = id;
                    break;
                }
            }

            if (foundId && renderers[foundId]) {
                const contentWrapper = document.createElement('div');
                contentWrapper.innerHTML = renderers[foundId]();
                terminalHistory.appendChild(contentWrapper);
            } else {
                const errorEntry = document.createElement('div');
                errorEntry.className = 'text-gray-400 ml-4 mb-4 mt-2';
                errorEntry.innerText = `bash: ${cmdString}: command not found. Type 'help' to see available commands.`;
                terminalHistory.appendChild(errorEntry);
            }
        }
        terminalWindow.scrollTop = terminalWindow.scrollHeight;
    }
